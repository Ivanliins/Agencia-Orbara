kind = "web"
previewPath = "/"
title = "Orbara — Sites que Orbitam Resultado"
version = "1.0.0"
id = "artifacts/orbara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18720

[services.development]
run = "pnpm --filter @workspace/orbara run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orbara", "run", "build" ]
publicDir = "artifacts/orbara/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18720"
BASE_PATH = "/"
